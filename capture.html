<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gallery - ESP32 Images</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; color: #334155; }
  
  /* Sidebar & Overlay */
  #sidebar {
    position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
    background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
    box-shadow: 4px 0 24px rgba(0,0,0,0.05); z-index: 60;
    transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 24px; display: flex; flex-direction: column;
  }
  #sidebar.active { left: 0; }
  
  .sidebar-link {
    display: flex; align-items: center; padding: 12px 16px; margin-bottom: 8px;
    border-radius: 12px; color: #475569; font-weight: 500; transition: all 0.2s;
  }
  .sidebar-link:hover { background: #eff6ff; color: #2563eb; transform: translateX(4px); }
  
  #overlayBg {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(2px); display:none; z-index:55;
  }

  /* Image Card */
  .img-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .img-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
  }

  /* Preview Overlay */
  #previewOverlay {
    backdrop-filter: blur(5px);
  }

  /* ปรับ Base Font สำหรับมือถือ */
@media (max-width: 768px) {
    html, body {
        font-size: 16px; /* บังคับ Base Size */
    }
    h1 { font-size: 2rem !important; } /* หัวข้อใหญ่ */
    h2 { font-size: 1.5rem !important; }
    h3 { font-size: 1.25rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอมากขึ้น */
    #app, .w-full.max-w-5xl, .w-full.max-w-6xl, .w-full.max-w-7xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger ใหญ่ขึ้น */
    .hamburger-btn {
        width: 56px;
        height: 56px;
        top: 16px;
        left: 16px;
    }
}

/* --- Mobile Fix for Capture --- */
  @media (max-width: 1024px) {
      #app, .w-full.max-w-7xl { padding: 20px 16px !important; width: 100% !important; }
      
      /* บังคับ Grid เป็น 1 คอลัมน์ (รูปใหญ่เต็มจอ) */
      #grid {
          grid-template-columns: 1fr !important; /* 1 รูปต่อแถว */
          gap: 20px !important;
      }

      /* ขยายการ์ด */
      .img-card {
          border-radius: 16px !important;
          box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      }
      
      /* ขยายตัวหนังสือในการ์ด */
      .img-card h3 { font-size: 1.1rem !important; }
      .img-card span { font-size: 0.9rem !important; }
  }

  /* --- Global Mobile Fix (วางไว้ล่างสุดของ style) --- */
@media (max-width: 1024px) {
    /* บังคับ Base Font ให้ใหญ่ขึ้น */
    html, body {
        font-size: 16px !important;
    }

    /* ขยายหัวข้อต่างๆ */
    h1 { font-size: 2.2rem !important; line-height: 1.3 !important; }
    h2 { font-size: 1.8rem !important; }
    h3 { font-size: 1.5rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอ ไม่ให้มีขอบเหลือเยอะเกินไป */
    #app, 
    .w-full.max-w-5xl, 
    .w-full.max-w-6xl, 
    .w-full.max-w-7xl,
    .max-w-6xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger (เมนู) ใหญ่ขึ้น */
    .hamburger-btn {
        width: 50px !important;
        height: 50px !important;
        top: 15px !important;
        left: 15px !important;
    }
    
    /* ขยาย Input และ ปุ่มกด ทั่วไป */
    input, select, textarea, button {
        font-size: 16px !important; /* ป้องกัน iOS ซูม */
    }
}
</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- 🔵 Hamburger Button -->
    <div id="menuBtn" class="fixed top-5 left-5 z-50 bg-white p-3 rounded-full shadow-md cursor-pointer hover:scale-105 transition">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </div>

    <!-- 🔵 Sidebar -->
    <div id="sidebar">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Menu</h2>
            <label class="cursor-pointer" id="closeSidebarBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </label>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="index.html" class="sidebar-link home">🏠 หน้าแรก</a>
            <a href="camera.html" class="sidebar-link camera">🤖 แขนกล 1</a>
            <a href="camera2.html" class="sidebar-link camera2">🤖 แขนกล 2</a>
            <a href="auto.html" class="sidebar-link auto">⚡ ระบบอัตโนมัติ</a>
            <a href="capture.html" class="sidebar-link image bg-blue-50 text-blue-600">📷 รูปภาพ</a>
            <a href="FAQ.html" class="sidebar-link faq">❓ ฟังก์ชันอื่นๆ</a>
        </nav>
        <div class="mt-auto pt-6 border-t border-slate-200">
            <div id="sidebarUsername" class="text-sm font-semibold text-slate-600 mb-3 truncate">ผู้ใช้: -</div>
            <button id="sidebarLogoutBtn" class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-2.5 rounded-xl font-semibold transition text-sm">ออกจากระบบ</button>
        </div>
    </div>
    <div id="overlayBg"></div>

    <!-- 🔵 Main Content -->
    <div class="w-full max-w-7xl mx-auto px-4 py-12 pb-24">
        <header class="text-center mb-10 mt-6">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-800 mb-2">แกลเลอรีรูปภาพ</h1>
            <p class="text-slate-500 text-sm">ภาพถ่ายจากกล้อง ESP32-CAM</p>
        </header>

        <!-- Image Grid -->
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
            <!-- JS will populate images here -->
        </div>
        
        <div id="empty" class="text-center py-20 hidden">
            <div class="inline-block p-4 bg-slate-100 rounded-full text-slate-400 mb-3">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </div>
            <p class="text-slate-500 font-medium">ยังไม่มีภาพในระบบ</p>
        </div>
    </div>

    <!-- 🔵 Reload Button (Floating) -->
    <button id="reloadBtn" class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-xl transition transform hover:scale-110 flex items-center gap-2 z-40">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        <span class="hidden md:inline font-bold">โหลดใหม่</span>
    </button>

    <!-- 🔵 Popup Preview -->
    <div id="previewOverlay" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4">
        <button id="closePreview" class="absolute top-6 right-6 text-white/70 hover:text-white transition">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <img id="previewImage" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl object-contain">
    </div>

    <footer class="text-center py-6 text-slate-400 text-xs">
    &copy; 2025 Klabot Dev Team. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const SUPABASE_URL = "https://yiaemxmwfxrfrwtogamw.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYWVteG13ZnhyZnJ3dG9nYW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MzMwOTYsImV4cCI6MjA3NzEwOTA5Nn0.I9MQPD_2LgpyELygjOroGG5qRTcwySM_t7c1o-ZvZpw";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const BUCKET_NAME = 'esp32-images';
        let currentUser = null;

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session || !session.user) { window.location.href = "login.html"; return; }
            currentUser = session.user;
            document.getElementById("sidebarUsername").textContent = `ผู้ใช้: ${currentUser.email}`;
            loadImages();
        }
        checkUser();

        document.getElementById("sidebarLogoutBtn").addEventListener("click", async () => {
            await supabaseClient.auth.signOut(); window.location.href = "login.html";
        });

        async function loadImages() {
            const grid = document.getElementById("grid");
            const empty = document.getElementById("empty");
            const reloadBtn = document.getElementById("reloadBtn");
            
            // Animation start
            reloadBtn.classList.add("animate-spin"); 
            grid.innerHTML = "";
            empty.classList.add("hidden");

            async function listAllFiles(path = "") {
                let results = [];
                const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list(path, { limit: 1000 });
                if (error) return results;
                for (const item of data) {
                    if (item.id === null) {
                        const subFiles = await listAllFiles(path ? `${path}/${item.name}` : item.name);
                        results = results.concat(subFiles);
                    } else {
                        results.push({ ...item, fullPath: path ? `${path}/${item.name}` : item.name });
                    }
                }
                return results;
            }

            const files = await listAllFiles();
            reloadBtn.classList.remove("animate-spin");

            if (!files || files.length === 0) {
                empty.classList.remove("hidden");
                return;
            }

            files.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i))
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                .forEach(file => {
                    const { data } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.fullPath);
                    
                    const card = document.createElement("div");
                    card.className = "img-card bg-white rounded-2xl overflow-hidden cursor-pointer border border-slate-100";
                    card.innerHTML = `
                        <div class="relative aspect-video bg-slate-200 overflow-hidden">
                            <img src="${data.publicUrl}" class="w-full h-full object-cover transition duration-500 hover:scale-110" loading="lazy">
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-slate-700 text-sm truncate mb-1">${file.name}</h3>
                            <div class="flex justify-between items-center text-xs text-slate-400">
                                <span>📅 ${new Date(file.created_at).toLocaleString('th-TH')}</span>
                                <span class="bg-slate-100 px-2 py-1 rounded">${(file.metadata?.size / 1024).toFixed(1)} KB</span>
                            </div>
                        </div>
                    `;
                    card.addEventListener("click", () => {
                        document.getElementById("previewImage").src = data.publicUrl;
                        document.getElementById("previewOverlay").classList.remove("hidden");
                        document.getElementById("previewOverlay").classList.add("flex");
                    });
                    grid.appendChild(card);
                });
        }

        document.getElementById("reloadBtn").addEventListener("click", loadImages);

        // Preview Logic
        const closePreview = () => {
            const overlay = document.getElementById("previewOverlay");
            overlay.classList.add("hidden");
            overlay.classList.remove("flex");
            document.getElementById("previewImage").src = "";
        };
        document.getElementById("closePreview").addEventListener("click", closePreview);
        document.getElementById("previewOverlay").addEventListener("click", (e) => {
            if(e.target.id === "previewOverlay") closePreview();
        });

        // Sidebar Logic
        const sidebar = document.getElementById("sidebar");
        const overlayBg = document.getElementById("overlayBg");
        const toggle = document.getElementById("sidebarToggle");

        document.getElementById("menuBtn").addEventListener("click", () => {
            sidebar.classList.add("active");
            overlayBg.style.display = "block";
        });
        document.getElementById("closeSidebarBtn").addEventListener("click", () => {
            sidebar.classList.remove("active");
            overlayBg.style.display = "none";
        });
        overlayBg.addEventListener("click", () => {
            sidebar.classList.remove("active");
            overlayBg.style.display = "none";
        });
    </script>
</body>
</html>
