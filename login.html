<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Klabot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Prompt', sans-serif; }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    
    .btn-gradient {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      transition: all 0.3s ease;
    }
    .btn-gradient:hover {
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      transform: translateY(-2px);
    }
    .btn-gradient:active { transform: scale(0.98); }

    /* Input Style */
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      background-color: #f8fafc;
      border: 1px solid #e2e8f0;
      outline: none;
      transition: all 0.2s;
      color: #334155;
    }
    .input-field:focus {
      background-color: #fff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Background Blobs */
    .blob {
      position: absolute;
      filter: blur(50px);
      z-index: -1;
      opacity: 0.6;
    }

    /* ปรับ Base Font สำหรับมือถือ */
@media (max-width: 768px) {
    html, body {
        font-size: 16px; /* บังคับ Base Size */
    }
    h1 { font-size: 2rem !important; } /* หัวข้อใหญ่ */
    h2 { font-size: 1.5rem !important; }
    h3 { font-size: 1.25rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอมากขึ้น */
    #app, .w-full.max-w-5xl, .w-full.max-w-6xl, .w-full.max-w-7xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger ใหญ่ขึ้น */
    .hamburger-btn {
        width: 56px;
        height: 56px;
        top: 16px;
        left: 16px;
    }
}

/* --- Global Mobile Fix (วางไว้ล่างสุดของ style) --- */
@media (max-width: 1024px) {
    /* บังคับ Base Font ให้ใหญ่ขึ้น */
    html, body {
        font-size: 16px !important;
    }

    /* ขยายหัวข้อต่างๆ */
    h1 { font-size: 2.2rem !important; line-height: 1.3 !important; }
    h2 { font-size: 1.8rem !important; }
    h3 { font-size: 1.5rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอ ไม่ให้มีขอบเหลือเยอะเกินไป */
    #app, 
    .w-full.max-w-5xl, 
    .w-full.max-w-6xl, 
    .w-full.max-w-7xl,
    .max-w-6xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger (เมนู) ใหญ่ขึ้น */
    .hamburger-btn {
        width: 50px !important;
        height: 50px !important;
        top: 15px !important;
        left: 15px !important;
    }
    
    /* ขยาย Input และ ปุ่มกด ทั่วไป */
    input, select, textarea, button {
        font-size: 16px !important; /* ป้องกัน iOS ซูม */
    }
}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center relative overflow-hidden p-4">

  <!-- Background Decoration -->
  <div class="blob w-96 h-96 bg-blue-200 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
  <div class="blob w-80 h-80 bg-indigo-200 rounded-full bottom-0 right-0 translate-x-1/3 translate-y-1/3"></div>

  <!-- แก้ไข Class ของ Container หลัก -->
  <div class="w-full max-w-md md:max-w-lg glass-effect p-6 md:p-8 rounded-3xl shadow-xl border border-white/50 mx-4">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-800 mb-2">ยินดีต้อนรับกลับ</h1>
      <p class="text-slate-500 text-sm">เข้าสู่ระบบ Klabot Smart Farming</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
        <input type="email" id="email" class="input-field text-base py-3 md:py-2" placeholder="name@example.com" required>
      </div>
      
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
        <input type="password" id="password" class="input-field text-base py-3 md:py-2" placeholder="••••••••" required>
      </div>

      <button type="submit" class="w-full btn-gradient text-white font-bold py-4 md:py-3.5 rounded-xl shadow-lg mt-6 text-lg">
        เข้าสู่ระบบ
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-500">
        ยังไม่มีบัญชี? 
        <a href="register.html" class="text-blue-600 font-bold hover:underline transition">สมัครสมาชิก</a>
      </p>
    </div>
  </div>

  <div class="fixed bottom-4 text-xs text-slate-400">
    © presented by klabot dev team
  </div>

  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      "https://yiaemxmwfxrfrwtogamw.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYWVteG13ZnhyZnJ3dG9nYW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MzMwOTYsImV4cCI6MjA3NzEwOTA5Nn0.I9MQPD_2LgpyELygjOroGG5qRTcwySM_t7c1o-ZvZpw"
    );

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const btn = event.target.querySelector('button');
      const originalText = btn.innerText;
      btn.innerText = "กำลังเข้าสู่ระบบ...";
      btn.disabled = true;
      btn.classList.add('opacity-70');

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        alert("เข้าสู่ระบบไม่สำเร็จ: " + error.message);
        btn.innerText = originalText;
        btn.disabled = false;
        btn.classList.remove('opacity-70');
        return;
      }

      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
