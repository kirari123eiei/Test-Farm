<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Welcome to Klabot</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Prompt', sans-serif; 
    background-color: #f8fafc; /* Slate-50 */
    color: #334155; 
    overflow-x: hidden;
  }

  /* ปุ่ม Enter สไตล์ Modern */
  .btn-enter {
    background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    transition: all 0.3s ease;
  }
  .btn-enter:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
  }
  .btn-enter:active { transform: scale(0.98); }

  /* Popup Animation */
  #popup {
    transition: opacity 0.5s ease, visibility 0.5s;
    opacity: 0;
    visibility: hidden;
  }
  #popup.active {
    opacity: 1;
    visibility: visible;
  }
  
  /* รูปภาพตกแต่ง */
  .hero-img {
    border-radius: 20px;
    box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15);
    transition: transform 0.5s ease;
    object-fit: cover;
  }
  .hero-img:hover { transform: scale(1.02); }

  .blob {
    position: absolute;
    background: #e0e7ff;
    border-radius: 50%;
    filter: blur(40px);
    z-index: -1;
  }

  /* ปรับ Base Font สำหรับมือถือ */
@media (max-width: 768px) {
    html, body {
        font-size: 16px; /* บังคับ Base Size */
    }
    h1 { font-size: 2rem !important; } /* หัวข้อใหญ่ */
    h2 { font-size: 1.5rem !important; }
    h3 { font-size: 1.25rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอมากขึ้น */
    #app, .w-full.max-w-5xl, .w-full.max-w-6xl, .w-full.max-w-7xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger ใหญ่ขึ้น */
    .hamburger-btn {
        width: 56px;
        height: 56px;
        top: 16px;
        left: 16px;
    }
}

/* --- Mobile Fix for Index --- */
  @media (max-width: 1024px) {
      /* ขยาย Font */
      html, body { font-size: 16px; }
      h1 { font-size: 2.5rem !important; line-height: 1.2 !important; }
      p { font-size: 1.1rem !important; }

      /* ขยายกล่องข้อความให้เต็มจอ */
      main { padding: 20px !important; }
      .max-w-6xl { width: 100% !important; }
      
      /* ปุ่มเข้าสู่เว็บไซต์ เต็มจอ */
      .btn-enter {
          width: 100% !important;
          justify-content: center;
          padding: 18px !important; /* ปุ่มสูงขึ้น */
          font-size: 1.2rem !important; /* ตัวหนังสือในปุ่มใหญ่ขึ้น */
      }
      
      /* ปรับรูปภาพไม่ให้เบียด */
      .hero-img { width: 100% !important; height: auto !important; }
  }

  /* --- Global Mobile Fix (วางไว้ล่างสุดของ style) --- */
@media (max-width: 1024px) {
    /* บังคับ Base Font ให้ใหญ่ขึ้น */
    html, body {
        font-size: 16px !important;
    }

    /* ขยายหัวข้อต่างๆ */
    h1 { font-size: 2.2rem !important; line-height: 1.3 !important; }
    h2 { font-size: 1.8rem !important; }
    h3 { font-size: 1.5rem !important; }
    
    /* ขยาย Container หลักให้เต็มจอ ไม่ให้มีขอบเหลือเยอะเกินไป */
    #app, 
    .w-full.max-w-5xl, 
    .w-full.max-w-6xl, 
    .w-full.max-w-7xl,
    .max-w-6xl {
        padding-left: 16px !important;
        padding-right: 16px !important;
        width: 100% !important;
        max-width: 100% !important;
    }

    /* ปุ่ม Hamburger (เมนู) ใหญ่ขึ้น */
    .hamburger-btn {
        width: 50px !important;
        height: 50px !important;
        top: 15px !important;
        left: 15px !important;
    }
    
    /* ขยาย Input และ ปุ่มกด ทั่วไป */
    input, select, textarea, button {
        font-size: 16px !important; /* ป้องกัน iOS ซูม */
    }
}
</style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- 🔵 Popup Overlay -->
    <div id="popup" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl transform transition-all scale-100 animate-fade-in-up">
            <!-- รูปใน Popup -->
            <img src="https://github.com/kirari123eiei/Test-Farm/blob/main/public/frame.jpg?raw=true" class="w-full rounded-xl block">
            
            <!-- ปุ่มปิด X -->
            <button id="closePopup" class="absolute -bottom-14 left-1/2 -translate-x-1/2 bg-white/20 hover:bg-white/40 text-white rounded-full p-3 transition border border-white/30 backdrop-blur-md">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <!-- 🔵 Main Content -->
    <main class="flex-grow flex items-center justify-center relative p-6">
        
        <!-- Background Blobs -->
        <div class="blob w-96 h-96 top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
        <div class="blob w-80 h-80 bottom-0 right-0 translate-x-1/3 translate-y-1/3 bg-blue-100"></div>

        <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            
            <!-- Left: Text Content -->
            <div class="text-center lg:text-left space-y-6 order-2 lg:order-1">
                <div class="inline-block px-3 py-1 bg-blue-50 text-blue-600 text-xs font-bold rounded-full mb-2 uppercase tracking-wide">
                    Smart Farming Innovation
                </div>
                <h1 class="text-5xl md:text-6xl font-bold text-slate-800 leading-tight mb-4">
                    Welcome to <br>
                    <span class="text-blue-600">Klabot Project</span>
                </h1>
                <p class="text-slate-500 text-lg md:text-xl max-w-lg mx-auto lg:mx-0 leading-relaxed">
                    สิ่งประดิษฐ์และนวัตกรรมด้านการเกษตรอัจฉริยะ<br>
                    โรงเรียนสาธิตมหาวิทยาลัยขอนแก่น ฝ่ายมัธยมศึกษา <br> (มอดินแดง)
                </p>
                
                <div class="pt-6 md:pt-4 w-full md:w-auto">
                    <a href="camera.html" class="btn-enter w-full md:w-auto justify-center inline-flex items-center gap-3 px-8 py-5 md:py-4 rounded-2xl md:rounded-full text-white font-bold text-xl md:text-lg shadow-lg">
                        <span>เข้าสู่เว็บไซต์</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                    </a>
                </div>
            </div>

            <!-- Right: Image Gallery (Masonry Style) -->
            <div class="order-1 lg:order-2 relative">
                <div class="grid grid-cols-2 gap-4">
                    <!-- รูปใหญ่ซ้าย -->
                    <div class="space-y-4 pt-12">
                        <img src="https://github.com/kirari123eiei/Test-Farm/blob/main/public/Klabot.jpg?raw=true" class="hero-img w-full h-64 object-cover">
                        <img src="https://github.com/kirari123eiei/Test-Farm/blob/main/public/hand.jpg?raw=true" class="hero-img w-full h-40 object-cover">
                    </div>
                    <!-- รูปใหญ่ขวา (เยื้องขึ้น) -->
                    <div class="space-y-4">
                        <img src="https://github.com/kirari123eiei/Test-Farm/blob/main/public/plant.jpg?raw=true" class="hero-img w-full h-48 object-cover">
                        <img src="https://github.com/kirari123eiei/Test-Farm/blob/main/public/innovation.jpg?raw=true" class="hero-img w-full h-72 object-cover">
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-slate-400 text-xs">
    &copy; 2025 Klabot Dev Team. All rights reserved.
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Connection
        const SUPABASE_URL = "https://yiaemxmwfxrfrwtogamw.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpYWVteG13ZnhyZnJ3dG9nYW13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1MzMwOTYsImV4cCI6MjA3NzEwOTA5Nn0.I9MQPD_2LgpyELygjOroGG5qRTcwySM_t7c1o-ZvZpw";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check Login
        async function checkUser(){
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(!session || !session.user){ 
                window.location.href="login.html"; 
                return; 
            }
        }
        checkUser();

        // Popup Logic
        window.addEventListener("load", () => {
            // หน่วงเวลาเล็กน้อยเพื่อให้หน้าเว็บโหลดเสร็จก่อนแสดง Popup
            setTimeout(() => {
                document.getElementById("popup").classList.add("active");
            }, 500);
        });

        document.getElementById("closePopup").addEventListener("click", () => {
            document.getElementById("popup").classList.remove("active");
        });
    </script>
</body>
</html>
